<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>ASTRA · Debug</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; color:#ddd; font-family:'Consolas',monospace; font-size:13px; padding:24px; }
h1 { color:#6b4fa0; letter-spacing:4px; font-size:14px; margin-bottom:20px; }
h2 { color:#888; letter-spacing:2px; font-size:11px; text-transform:uppercase; margin:24px 0 10px; border-bottom:1px solid #222; padding-bottom:6px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.card { background:#111; border:1px solid #222; border-radius:8px; padding:14px; }
.card-title { color:#555; font-size:10px; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.card-val { color:#e0e0e0; font-size:20px; font-weight:700; }
.card-sub { color:#555; font-size:11px; margin-top:4px; }
.sources { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
.src-chip { background:#1a1a2e; border:1px solid #2a2a4a; color:#7a7aaa; padding:2px 10px; border-radius:10px; font-size:11px; }
input[type=text] { background:#111; border:1px solid #333; color:#ddd; border-radius:6px; padding:8px 12px; font-family:'Consolas',monospace; font-size:13px; width:100%; outline:none; }
input[type=text]:focus { border-color:#6b4fa0; }
button { background:#6b4fa0; border:none; color:#fff; padding:8px 20px; border-radius:6px; cursor:pointer; font-family:'Consolas',monospace; font-size:12px; margin-top:8px; }
button:hover { background:#7d5fb5; }
.row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.row input { flex:1; }
#results { margin-top:16px; }
.result-item { background:#111; border:1px solid #1e1e1e; border-radius:8px; padding:12px; margin-bottom:8px; }
.result-item:hover { border-color:#2a2a4a; }
.result-header { display:flex; gap:10px; align-items:baseline; margin-bottom:6px; flex-wrap:wrap; }
.result-score { color:#6b4fa0; font-size:15px; font-weight:700; }
.result-source { background:#1a1a2e; border:1px solid #2a2a4a; color:#7a7aaa; padding:1px 8px; border-radius:8px; font-size:10px; }
.result-ts { color:#444; font-size:11px; }
.result-milestone { background:#2a1a0a; border:1px solid #4a2a0a; color:#aa7a3a; padding:1px 8px; border-radius:8px; font-size:10px; }
.result-text { color:#bbb; font-size:12px; line-height:1.6; margin:6px 0; }
.score-bar-wrap { display:flex; flex-direction:column; gap:3px; margin-top:8px; }
.score-row { display:flex; align-items:center; gap:8px; }
.score-label { color:#555; font-size:10px; width:70px; }
.score-bar-bg { flex:1; height:5px; background:#1a1a1a; border-radius:3px; overflow:hidden; }
.score-bar { height:100%; border-radius:3px; transition:width 0.3s; }
.bar-sim { background:#6b4fa0; }
.bar-imp { background:#4caf7d; }
.bar-rec { background:#e67e22; }
.bar-kw  { background:#3498db; }
.score-num { color:#666; font-size:10px; width:36px; text-align:right; }
.no-results { color:#444; padding:20px; text-align:center; }
.state-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.state-card { background:#111; border:1px solid #222; border-radius:6px; padding:10px; }
.state-card .k { color:#555; font-size:10px; margin-bottom:4px; }
.state-card .v { color:#e0e0e0; }
.concerns { color:#7a7aaa; font-size:12px; margin-top:6px; }
.weights { display:flex; gap:16px; margin-top:4px; font-size:11px; color:#555; }
.weights span { color:#6b4fa0; }
</style>
</head>
<body>
<h1>◈ ASTRA DEBUG PANEL</h1>

<h2>System Stats</h2>
<div id="stats-area"><div class="no-results">Ładowanie...</div></div>

<h2>RAG Inspector</h2>
<div class="weights">
  Wagi reranker'a:
  similarity <span>0.65</span> ·
  importance <span>0.20</span> ·
  recency <span>0.15</span> ·
  keyword_boost <span>+bonus</span>
</div>
<div class="row" style="margin-top:10px">
  <input type="text" id="query-input" placeholder="Wpisz zapytanie np. 'Crohn', 'AI amnesia', 'praca'..." />
  <button onclick="runRag()">Szukaj</button>
</div>
<div id="results"></div>

<script>
async function loadStats() {
  try {
    const r = await fetch('/api/debug/stats');
    const d = await r.json();
    const s = d.sources || {};
    const chips = Object.entries(s).map(([k,v]) =>
      `<span class="src-chip">${k}: ${v}</span>`).join('');
    const concerns = d.state.active_concerns.length
      ? d.state.active_concerns.map(c=>`<div>· ${c}</div>`).join('')
      : '<div style="color:#444">brak</div>';
    document.getElementById('stats-area').innerHTML = `
      <div class="grid">
        <div class="card">
          <div class="card-title">Wektory</div>
          <div class="card-val">${d.total_vectors}</div>
          <div class="card-sub">persona: ${d.persona_vectors}</div>
          <div class="sources" style="margin-top:8px">${chips}</div>
        </div>
        <div class="card">
          <div class="card-title">Stan relacji</div>
          <div class="state-grid">
            <div class="state-card"><div class="k">LEVEL</div><div class="v" style="color:#6b4fa0">${d.state.level} · ${d.state.level_name}</div></div>
            <div class="state-card"><div class="k">XP</div><div class="v">${d.state.xp}</div></div>
            <div class="state-card"><div class="k">MOOD</div><div class="v">${d.state.mood}</div></div>
            <div class="state-card"><div class="k">TOTAL MSG</div><div class="v">${d.state.total_messages}</div></div>
          </div>
          <div class="concerns" style="margin-top:8px"><span style="color:#555;font-size:10px">CONCERNS: </span>${concerns}</div>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('stats-area').innerHTML = `<div class="no-results">Błąd: ${e.message}</div>`;
  }
}

async function runRag() {
  const q = document.getElementById('query-input').value.trim();
  if (!q) return;
  document.getElementById('results').innerHTML = '<div class="no-results">Szukam...</div>';
  try {
    const r = await fetch(`/api/debug/rag?query=${encodeURIComponent(q)}&n=10`);
    const d = await r.json();
    if (!d.results.length) {
      document.getElementById('results').innerHTML = '<div class="no-results">Brak wyników.</div>';
      return;
    }
    const html = d.results.map((res, i) => {
      const sd = res.score_detail || {};
      const milestone = res.is_milestone ? '<span class="result-milestone">★ MILESTONE</span>' : '';
      return `
        <div class="result-item">
          <div class="result-header">
            <span class="result-score">${res.final_score}</span>
            <span class="result-source">${res.source}</span>
            <span class="result-ts">${(res.timestamp||'').slice(0,16)}</span>
            ${milestone}
            <span style="color:#444;font-size:11px">imp=${res.importance} dist=${(res.distance||0).toFixed(3)}</span>
          </div>
          <div class="result-text">${res.text}</div>
          <div class="score-bar-wrap">
            ${bar('similarity', sd.similarity||0, 'bar-sim')}
            ${bar('importance', sd.importance||0, 'bar-imp')}
            ${bar('recency',    sd.recency||0,    'bar-rec')}
            ${bar('keyword',    Math.min(sd.keyword||0, 1), 'bar-kw')}
          </div>
        </div>`;
    }).join('');
    document.getElementById('results').innerHTML = html;
  } catch(e) {
    document.getElementById('results').innerHTML = `<div class="no-results">Błąd: ${e.message}</div>`;
  }
}

function bar(label, val, cls) {
  const pct = Math.round(val * 100);
  return `<div class="score-row">
    <span class="score-label">${label}</span>
    <div class="score-bar-bg"><div class="score-bar ${cls}" style="width:${pct}%"></div></div>
    <span class="score-num">${val.toFixed(3)}</span>
  </div>`;
}

document.getElementById('query-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') runRag();
});

loadStats();
</script>
</body>
</html>
